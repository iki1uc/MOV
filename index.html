<!DOCTYPE html>
<html>
<head>
    <title>MOV – Movement & Routing</title>
</head>
<body>
    <h1>MOV – Movement / Routing</h1>
    <p>Steuert Bewegungslogik und System-Routing.</p>

    <button onclick="route('forward')">Vorwärts</button>
    <button onclick="route('back')">Zurück</button>
    <button onclick="route('jump')">Sprung</button>

    <script>
        function route(action) {
            console.log("Routing:", action);
        }
    </script>
</body>
</html>
